version: '3.8'

services:
  # 核心 API 服务
  kb-api:
    build: 
      context: ..
      dockerfile: deploy/Dockerfile
    image: se-kb-api:v1
    restart: always
    environment:
      - FLASK_ENV=production
      # 替换为真实的 Key，或使用 .env 文件
      # - KB_READ_KEYS=sk-read-123
      # - KB_ADMIN_KEYS=sk-admin-456
    volumes:
      # 只读挂载知识库，防止在线服务意外修改数据
      # 生产环境建议使用 rsync 同步数据到宿主机该目录
      - ../se_kb:/app/se_kb:ro
      # 挂载日志目录
      - ../logs:/app/logs
      # 挂载配置 (API Key, LLM Key)
      - ../.env:/app/.env
    networks:
      - kb-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 网关
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - kb-api
    networks:
      - kb-net

  # [可选] Cloudflare Tunnel (无需公网IP即可暴露服务)
  # 使用前请先去 Cloudflare Zero Trust 创建 Tunnel 并获取 Token
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
  #   networks:
  #     - kb-net

networks:
  kb-net:
    driver: bridge

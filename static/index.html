<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Client - 智能爬虫工具</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>MCP Client</h1>
            <p>智能爬虫工具 - 精确主题搜索</p>
        </header>
        
        <div class="main-content">
            <!-- 主题选择和搜索区域 -->
            <div class="search-container">
                <div class="search-form">
                    <div class="form-group">
                        <label for="topicSelect">选择爬取主题：</label>
                        <select id="topicSelect" class="topic-select">
                            <option value="general">通用内容分析</option>
                            <option value="requirement_analysis">需求分析</option>
                            <option value="dfd_expert">数据流图(DFD)</option>
                            <option value="requirement_to_dfd">需求生成DFD</option>
                            <option value="system_design">系统设计</option>
                            <option value="universal_knowledge">通用知识库</option>
                            <option value="semantic_search">🔍 语义检索 (Semantic Search)</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="searchInput">搜索内容：</label>
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="例如：dfd基础概念、需求分析方法、系统架构设计..."
                            maxlength="200"
                        />
                    </div>
                    
                    <div class="form-actions">
                        <button id="startCrawlBtn" class="crawl-button" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            开始爬取
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 结果展示区域 -->
            <div class="results-container">
                <div class="results-header">
                    <h3>爬取结果</h3>
                    <div class="results-status" id="resultsStatus">等待开始爬取...</div>
                </div>
                <div class="results-content" id="resultsContent">
                    <div class="welcome-message">
                        <h4>欢迎使用智能爬虫工具</h4>
                        <p>请选择爬取主题并输入搜索内容，系统将为您精确调用对应的专业工具进行内容爬取和分析。</p>
                        <ul>
                            <li><strong>需求分析</strong> - 专门分析软件需求、业务需求相关内容</li>
                            <li><strong>数据流图(DFD)</strong> - 专门分析DFD设计、绘制相关内容</li>
                            <li><strong>需求生成DFD</strong> - 专门分析需求到DFD转换的方法</li>
                            <li><strong>系统设计</strong> - 专门分析系统架构、技术选型相关内容</li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <!-- 实时日志面板 -->
            <div class="log-panel" id="logPanel">
                <div class="log-header">
                    <h3>实时日志</h3>
                    <div class="log-controls">
                        <button id="clearLogsBtn" class="log-btn">清空</button>
                        <button id="toggleLogsBtn" class="log-btn">隐藏</button>
                    </div>
                </div>
                <div class="log-content" id="logContent">
                    <div class="log-entry system">
                        <span class="log-time">[刚刚]</span>
                        <span class="log-message">系统已启动，等待选择主题和搜索内容...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="loading" id="loading" style="display: none;">
            <div class="loading-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span>AI 正在思考中...</span>
        </div>
    </div>

    
    <script src="/static/script.js"></script>
</body>
</html>
